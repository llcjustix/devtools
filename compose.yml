services:
  #------------------------------------------ PostgreSQL Database ------------------------------------------------------
  postgres:
    container_name: postgresql
    image: postgres:${POSTGRES_VERSION}
    command: [ "postgres", "-c", "max_connections=200", "-c", "shared_buffers=24MB", "-c", "listen_addresses=*" ]
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    networks:
      - infra-network
    volumes:
      - ./data/postgresql:/var/lib/postgresql/data
  #------------------------------------------- Keycloak ----------------------------------------------------------------
  keycloak:
    container_name: keycloak
    image: quay.io/keycloak/keycloak:${KEYCLOAK_VERSION}
    command: [ "start-dev", "--import-realm", "--hostname-strict=false" ]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD}
      KC_DB: dev-file
      KC_HTTP_PORT: 8080
      KC_HEALTH_ENABLED: "true"
    ports:
      - "${KEYCLOAK_PORT}:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import
    healthcheck:
      test: [ "CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080" ]
      interval: 10s
      timeout: 5s
      retries: 15
    networks:
      - infra-network
  #------------------------------------------- Keycloak Init------------------------------------------------------------
  keycloak-init:
    container_name: keycloak-init
    image: quay.io/keycloak/keycloak:${KEYCLOAK_VERSION}
    depends_on:
      keycloak:
        condition: service_healthy
    entrypoint:
      - bash
      - -c
      - |
        KCADM=/opt/keycloak/bin/kcadm.sh

        echo '--- Authenticating to Keycloak admin ---'
        $$KCADM config credentials --server http://keycloak:8080 --realm master --user $$KC_USER --password $$KC_PASS

        echo '--- Disabling SSL on master realm ---'
        $$KCADM update realms/master -s sslRequired=NONE

        echo '--- Configuring client secret for $$KC_CLIENT_ID in realm $$KC_REALM ---'
        CLIENT_UUID=$$($$KCADM get clients -r $$KC_REALM -q clientId=$$KC_CLIENT_ID --fields id 2>/dev/null | grep '"id"' | sed 's/.*: *"\(.*\)".*/\1/')

        if [ -n "$$CLIENT_UUID" ]; then
          $$KCADM update clients/$$CLIENT_UUID -r $$KC_REALM -s "secret=$$KC_CLIENT_SECRET"
          echo "--- Client secret updated for $$KC_CLIENT_ID ($$CLIENT_UUID) ---"
        else
          echo "--- WARNING: Client $$KC_CLIENT_ID not found in realm $$KC_REALM ---"
        fi

        echo '--- Configuring user profile (register user_id attribute, relax firstName/lastName) ---'
        cat > /tmp/up.json << 'UP_EOF'
        {"attributes":[{"name":"username","displayName":"username","validations":{"length":{"min":3,"max":255},"username-prohibited-characters":{},"up-username-not-idn-homograph":{}},"permissions":{"view":["admin","user"],"edit":["admin","user"]},"multivalued":false},{"name":"email","displayName":"email","validations":{"email":{},"length":{"max":255}},"required":{"roles":["user"]},"permissions":{"view":["admin","user"],"edit":["admin","user"]},"multivalued":false},{"name":"firstName","displayName":"firstName","validations":{"length":{"max":255},"person-name-prohibited-characters":{}},"permissions":{"view":["admin","user"],"edit":["admin","user"]},"multivalued":false},{"name":"lastName","displayName":"lastName","validations":{"length":{"max":255},"person-name-prohibited-characters":{}},"permissions":{"view":["admin","user"],"edit":["admin","user"]},"multivalued":false},{"name":"user_id","displayName":"User ID","permissions":{"view":["admin"],"edit":["admin"]},"multivalued":false}],"groups":[{"name":"user-metadata","displayHeader":"User metadata","displayDescription":"Attributes, which refer to user metadata"}]}
        UP_EOF
        $$KCADM update realms/$$KC_REALM/users/profile -f /tmp/up.json
        echo '--- User profile configured ---'

        echo '--- Keycloak init completed ---'
    environment:
      KC_USER: ${KC_BOOTSTRAP_ADMIN_USERNAME}
      KC_PASS: ${KC_BOOTSTRAP_ADMIN_PASSWORD}
      KC_REALM: ${KEYCLOAK_REALM}
      KC_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      KC_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
    networks:
      - infra-network
  #------------------------------------------ Redis --------------------------------------------------------------------
  redis:
    container_name: redis
    image: redis:${REDIS_VERSION}
    ports:
      - "6379:6379"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-password}
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - ./data/redis:/data
    networks:
      - infra-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
  #------------------------------------------ Redis insight -------------------------------------------------------------#
  redis-insight:
    container_name: redis-insight
    image: redis/redisinsight:${REDIS_INSIGHT_VERSION}
    restart: always
    ports:
      - '5540:5540'
    volumes:
      - ./data/redis:/data
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - infra-network
    environment:
      - REDIS_HOSTS=local:host=redis,port=6379,password=${REDIS_PASSWORD:-password}
  #--------------------------------------------- MinIO ------------------------------------------------------------------#
  minio:
    container_name: minio
    image: minio/minio:${MINIO_VERSION}
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-admin}
    volumes:
      - ./data/minio:/data
    ports:
      - '${MINIO_API_PORT}:9000'
      - '${MINIO_CONSOLE_PORT}:9001'
    command: server /data --console-address ":9001"
    healthcheck:
      test: curl -f http://localhost:9000/minio/health/live || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - infra-network

  #---------------------------------------------------KAFKA-------------------------------------------------------------
  kafka:
    container_name: kafka
    image: confluentinc/cp-kafka:${KAFKA_VERSION}
    restart: always
    ports:
      - '9092:9092'
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: mk01-cluster-id-1234567890
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_MIN_IN_SYNC_REPLICAS: 1
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 29092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    volumes:
      - ./data/kafka:/var/lib/kafka/data
    networks:
      - infra-network

  #------------------------------------------------------KAFKA-UI-------------------------------------------------------
  kafka-ui:
    container_name: kafka-ui
    image: provectuslabs/kafka-ui:${KAFKA_UI_VERSION}
    restart: always
    ports:
      - '8000:8080'
    environment:
      KAFKA_CLUSTERS_0_NAME: Kafka-V35
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      DYNAMIC_CONFIG_ENABLED: true
      KAFKA_CLUSTERS_0_READ_ONLY: false
      KAFKA_CLUSTERS_0_AUDIT_TOPICAUDITENABLED: true
      KAFKA_CLUSTERS_0_AUDIT_CONSOLEAUDITENABLED: true
      LOGGING_LEVEL_ROOT: INFO
      LOGGING_LEVEL_COM_PROVECTUS: DEBUG
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080" ]
      interval: 15s
      timeout: 5s
      retries: 5
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - infra-network

  #------------------------------------------ JITSI MEET STACK ---------------------------------------------------------
  # Jitsi is now managed separately in ~/IdeaProjects/justix/jitsi/
  # See: ~/IdeaProjects/justix/jitsi/compose.yml

#---------------------------------------------- Volumes ---------------------------------------------------------------
volumes: {}

#---------------------------------------------- Networks ---------------------------------------------------------------
networks:
  infra-network:
    driver: bridge
    name: infra-network
