<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - LearnX Meets</title>
    <link rel="icon" href="images/learnx-icon.svg">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #faf8ff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar {
            display: flex;
            align-items: center;
            padding: 16px 32px;
            background: white;
            border-bottom: 1px solid #f0ecf9;
        }
        .navbar a { display: flex; align-items: center; text-decoration: none; }
        .navbar img { height: 30px; }

        .main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
        }

        .error-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 32px rgba(124, 58, 237, 0.06);
            padding: 56px 48px;
            max-width: 540px;
            width: 100%;
            text-align: center;
            border: 1px solid #f0ecf9;
        }

        .error-icon-wrap {
            width: 88px;
            height: 88px;
            border-radius: 24px;
            background: #f5f0ff;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 28px;
            font-size: 40px;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            color: #1f1f1f;
            margin-bottom: 8px;
        }

        .error-code {
            font-size: 13px;
            font-weight: 500;
            color: #7c3aed;
            margin-bottom: 16px;
            letter-spacing: 0.5px;
        }

        .error-message {
            color: #6b7280;
            font-size: 15px;
            line-height: 1.7;
            margin-bottom: 28px;
        }

        .error-details {
            background: #faf8ff;
            border-left: 3px solid #c4b5fd;
            padding: 14px 18px;
            text-align: left;
            border-radius: 0 12px 12px 0;
            margin-bottom: 32px;
            display: none;
        }
        .error-details strong {
            color: #4b5563;
            display: block;
            font-size: 13px;
            margin-bottom: 6px;
        }
        .error-details p {
            color: #6b7280;
            font-size: 13px;
            margin: 3px 0;
            line-height: 1.5;
        }

        .actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            font-family: inherit;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #9b6dff, #7c3aed);
            color: white;
        }
        .btn-primary:hover {
            box-shadow: 0 4px 16px rgba(124, 58, 237, 0.3);
            transform: translateY(-1px);
        }
        .btn-secondary {
            background: #f5f0ff;
            color: #7c3aed;
        }
        .btn-secondary:hover {
            background: #ede5ff;
        }

        @media (max-width: 480px) {
            .error-card { padding: 40px 24px; }
            h1 { font-size: 20px; }
            .actions { flex-direction: column; }
            .btn { width: 100%; text-align: center; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/">
            <img src="images/learnx-logo.svg" alt="LearnX Meets">
        </a>
    </nav>

    <div class="main">
        <div class="error-card">
            <div class="error-icon-wrap" id="errorIconWrap">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            </div>

            <h1 id="errorTitle">Meeting Not Found</h1>
            <p class="error-code" id="errorCode">MEETING_NOT_FOUND</p>
            <p class="error-message" id="errorMessage">
                This meeting doesn't exist or the link is invalid.
                Please check the link you received and try again.
            </p>

            <div class="error-details" id="errorDetails">
                <strong>Possible reasons:</strong>
                <p id="errorReason"></p>
            </div>

            <div class="actions">
                <a href="https://learnx.uz" class="btn btn-primary">Go to Dashboard</a>
                <a href="/" class="btn btn-secondary">Back to Home</a>
            </div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const error = params.get('error');
        const reason = params.get('reason');
        const room = params.get('room');

        const icons = {
            search: '<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>',
            check: '<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#059669" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>',
            lock: '<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>',
            clock: '<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#d97706" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',
            ban: '<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>'
        };

        const errorMessages = {
            'meeting-not-found': {
                title: 'Meeting Not Found',
                icon: icons.search,
                code: 'MEETING_NOT_FOUND',
                message: 'This meeting does not exist. Please check the meeting link you received from your instructor.',
                reasons: [
                    'The meeting link is incorrect or incomplete',
                    'The meeting has been deleted',
                    'You may have accessed an old or expired link'
                ]
            },
            'meeting-ended': {
                title: 'Meeting Has Ended',
                icon: icons.check,
                code: 'MEETING_ENDED',
                message: 'This meeting has ended and is no longer available to join.',
                reasons: [
                    'The meeting finished at its scheduled end time',
                    'The host ended the meeting',
                    'The meeting duration limit was reached'
                ]
            },
            'meeting-cancelled': {
                title: 'Meeting Cancelled',
                icon: icons.ban,
                code: 'MEETING_CANCELLED',
                message: 'This meeting was cancelled by the organizer.',
                reasons: [
                    'The meeting was cancelled before it started',
                    'Contact your instructor for more information'
                ]
            },
            'access-denied': {
                title: 'Access Denied',
                icon: icons.lock,
                code: 'ACCESS_DENIED',
                message: 'You are not authorized to join this meeting. Only invited participants can access private meetings.',
                reasons: [
                    'This is a private meeting',
                    'You are not on the invitation list',
                    'Contact the organizer if you believe this is an error'
                ]
            },
            'unauthorized': {
                title: 'Authentication Required',
                icon: icons.lock,
                code: 'UNAUTHORIZED',
                message: 'You need to sign in to join this meeting.',
                reasons: [
                    'This is a private meeting requiring authentication',
                    'Your session may have expired',
                    'Please sign in and try again'
                ]
            },
            'meeting-expired': {
                title: 'Meeting Expired',
                icon: icons.clock,
                code: 'MEETING_EXPIRED',
                message: 'This meeting link has expired.',
                reasons: [
                    'The meeting exceeded its time limit',
                    'Scheduled meetings expire after their end time',
                    'Contact the organizer to schedule a new meeting'
                ]
            },
            'service-error': {
                title: 'Service Unavailable',
                icon: icons.clock,
                code: 'SERVICE_ERROR',
                message: 'The meeting service is temporarily unavailable. Please try again in a moment.',
                reasons: [
                    'The service is experiencing temporary issues',
                    'Please refresh the page or try again later'
                ]
            },
            'validation-error': {
                title: 'Validation Failed',
                icon: icons.clock,
                code: 'VALIDATION_ERROR',
                message: 'Unable to validate your access to this meeting.',
                reasons: [
                    'There was a problem verifying your credentials',
                    'Please try signing in again'
                ]
            }
        };

        if (error && errorMessages[error]) {
            const info = errorMessages[error];
            document.getElementById('errorTitle').textContent = info.title;
            document.getElementById('errorCode').textContent = info.code;
            document.getElementById('errorMessage').textContent = info.message;
            document.getElementById('errorIconWrap').innerHTML = info.icon;

            if (info.reasons) {
                const reasonsHtml = info.reasons.map(r => `<p>&bull; ${r}</p>`).join('');
                document.getElementById('errorReason').innerHTML = reasonsHtml;
                document.getElementById('errorDetails').style.display = 'block';
            }
        } else if (reason) {
            document.getElementById('errorReason').innerHTML = `<p>&bull; ${reason}</p>`;
            document.getElementById('errorDetails').style.display = 'block';
        }

        if (room) {
            const roomEl = document.createElement('p');
            roomEl.style.cssText = 'color:#9ca3af;font-size:13px;margin-top:12px;';
            roomEl.innerHTML = `Room: <strong>${room}</strong>`;
            document.getElementById('errorMessage').after(roomEl);
        }

        // Show login button for auth errors
        if (error === 'unauthorized' || error === 'access-denied') {
            const actions = document.querySelector('.actions');
            if (room) {
                const loginLink = document.createElement('a');
                loginLink.href = `/login.html?room=${encodeURIComponent(room)}&returnUrl=${encodeURIComponent(window.location.origin + '/' + room)}`;
                loginLink.className = 'btn btn-primary';
                loginLink.textContent = 'Sign In';
                actions.prepend(loginLink);
            }
        }
    </script>
</body>
</html>
