<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in - LearnX Meets</title>
    <link rel="icon" href="images/justix-icon.svg">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #faf8ff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navbar */
        .navbar {
            display: flex;
            align-items: center;
            padding: 16px 32px;
            background: white;
            border-bottom: 1px solid #f0ecf9;
        }
        .navbar a {
            display: flex;
            align-items: center;
            text-decoration: none;
        }
        .navbar img { height: 30px; }

        /* Main */
        .main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
        }

        .login-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 32px rgba(124, 58, 237, 0.06);
            padding: 48px 40px;
            max-width: 420px;
            width: 100%;
            border: 1px solid #f0ecf9;
        }

        .login-header {
            text-align: center;
            margin-bottom: 8px;
        }

        .login-header h1 {
            font-size: 24px;
            font-weight: 600;
            color: #1f1f1f;
            margin-bottom: 8px;
        }

        .login-header p {
            font-size: 14px;
            color: #9ca3af;
        }

        /* Meeting info badge */
        .meeting-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f5f0ff;
            border-radius: 12px;
            padding: 12px 16px;
            margin: 24px 0;
        }
        .meeting-badge-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: linear-gradient(135deg, #9b6dff, #7c3aed);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .meeting-badge-icon svg { width: 18px; height: 18px; }
        .meeting-badge-text h3 {
            font-size: 14px;
            font-weight: 500;
            color: #1f1f1f;
        }
        .meeting-badge-text p {
            font-size: 12px;
            color: #9ca3af;
            margin-top: 2px;
        }

        /* Form */
        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #4b5563;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e5e7eb;
            border-radius: 12px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: #faf8ff;
        }
        input:focus {
            outline: none;
            border-color: #7c3aed;
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
            background: white;
        }

        .login-btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #9b6dff, #7c3aed);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 4px;
        }
        .login-btn:hover {
            box-shadow: 0 4px 20px rgba(124, 58, 237, 0.35);
            transform: translateY(-1px);
        }
        .login-btn:active { transform: translateY(0); }
        .login-btn:disabled {
            background: #d1d5db;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .error-message {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 12px 14px;
            border-radius: 12px;
            margin-bottom: 18px;
            font-size: 13px;
            display: none;
        }

        .loading {
            text-align: center;
            padding: 24px;
            display: none;
        }
        .spinner {
            border: 3px solid #f0ecf9;
            border-top: 3px solid #7c3aed;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading p {
            margin-top: 12px;
            color: #9ca3af;
            font-size: 14px;
        }

        .help-text {
            text-align: center;
            color: #9ca3af;
            font-size: 12px;
            margin-top: 20px;
        }
        .help-text a {
            color: #7c3aed;
            text-decoration: none;
        }
        .help-text a:hover { text-decoration: underline; }

        @media (max-width: 480px) {
            .login-card { padding: 32px 24px; }
            .navbar { padding: 12px 16px; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/">
            <img src="images/justix-logo.svg" alt="LearnX Meets">
        </a>
    </nav>

    <div class="main">
        <div class="login-card">
            <div class="login-header">
                <h1>Sign in to join</h1>
                <p>Enter your credentials to access this meeting</p>
            </div>

            <div class="meeting-badge" id="meetingInfo">
                <div class="meeting-badge-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
                </div>
                <div class="meeting-badge-text">
                    <h3 id="meetingTitle">Loading...</h3>
                    <p id="meetingRoom"></p>
                </div>
            </div>

            <div class="error-message" id="errorMessage"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required
                           placeholder="you@example.com" autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required
                           placeholder="Enter your password" autocomplete="current-password">
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    Join Meeting
                </button>
            </form>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Signing in...</p>
            </div>

            <div class="help-text">
                <a href="https://learnx.uz">Back to LearnX</a>
            </div>
        </div>
    </div>

    <script>
        // Service URL detection
        const getMeetingServiceUrl = () => {
            if (window.MEETING_SERVICE_URL) return window.MEETING_SERVICE_URL;
            const h = window.location.hostname;
            if (h === 'localhost' || h === '127.0.0.1') return 'http://localhost:2031';
            if (h === 'host.docker.internal') return 'http://host.docker.internal:2031';
            return window.location.protocol + '//' + h.replace('meet.', '');
        };
        const getAuthServiceUrl = () => {
            if (window.AUTH_SERVICE_URL) return window.AUTH_SERVICE_URL;
            const h = window.location.hostname;
            if (h === 'localhost' || h === '127.0.0.1') return 'http://localhost:2025';
            if (h === 'host.docker.internal') return 'http://host.docker.internal:2025';
            return window.location.protocol + '//' + h.replace('meet.', '');
        };

        const meetingServiceUrl = getMeetingServiceUrl();
        const authServiceUrl = getAuthServiceUrl();

        // Extract room name from URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const roomName = urlParams.get('room');
        const returnUrl = urlParams.get('returnUrl');

        // Check if user already has a valid token
        const existingToken = sessionStorage.getItem('jitsi_jwt_token') || localStorage.getItem('jitsi_jwt_token');
        if (existingToken) {
            try {
                const base64 = existingToken.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
                const payload = JSON.parse(atob(base64));
                if (payload.exp && (payload.exp * 1000) > Date.now()) {
                    // Token still valid — redirect immediately
                    const dest = returnUrl || (roomName ? (window.location.origin + '/' + roomName) : '/welcome.html');
                    window.location.href = dest;
                } else {
                    // Expired — clear
                    sessionStorage.removeItem('jitsi_jwt_token');
                    localStorage.removeItem('jitsi_jwt_token');
                }
            } catch (e) { /* invalid token, let user login */ }
        }

        // Load meeting info
        if (roomName) {
            document.getElementById('meetingTitle').textContent = 'Loading...';
            document.getElementById('meetingRoom').textContent = 'Room: ' + roomName;
            fetch(meetingServiceUrl + '/meetings/by-room/' + roomName)
                .then(function(res) {
                    if (res.ok) return res.json();
                    throw new Error('not found');
                })
                .then(function(meeting) {
                    document.getElementById('meetingTitle').textContent = meeting.title || 'Private Meeting';
                })
                .catch(function() {
                    document.getElementById('meetingTitle').textContent = 'Private Meeting';
                });
        } else {
            document.getElementById('meetingTitle').textContent = 'LearnX Meets';
            document.getElementById('meetingRoom').textContent = 'Sign in to access meetings';
            document.getElementById('loginBtn').textContent = 'Sign In';
        }

        // Handle form submission
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            const loginForm = document.getElementById('loginForm');
            const loading = document.getElementById('loading');

            errorDiv.style.display = 'none';
            loginForm.style.display = 'none';
            loading.style.display = 'block';

            try {
                const response = await fetch(authServiceUrl + '/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: email, password: password })
                });

                if (response.ok) {
                    const data = await response.json();
                    const jwtToken = data.access_token || data.token;

                    if (!jwtToken) {
                        throw new Error('No token received from authentication service');
                    }

                    // Store token in both storages for persistence
                    sessionStorage.setItem('jitsi_jwt_token', jwtToken);
                    localStorage.setItem('jitsi_jwt_token', jwtToken);

                    // Redirect to meeting room or welcome page
                    const dest = returnUrl || (roomName ? (window.location.origin + '/' + roomName) : '/welcome.html');
                    window.location.href = dest;
                } else {
                    const errorText = await response.text();
                    let msg = 'Authentication failed';
                    try {
                        const errorJson = JSON.parse(errorText);
                        msg = errorJson.message || errorJson.error || msg;
                    } catch (e) {
                        msg = errorText || msg;
                    }
                    throw new Error(msg);
                }
            } catch (error) {
                errorDiv.textContent = error.message || 'Authentication failed. Please try again.';
                errorDiv.style.display = 'block';
                loading.style.display = 'none';
                loginForm.style.display = 'block';
            }
        });
    </script>
</body>
</html>
