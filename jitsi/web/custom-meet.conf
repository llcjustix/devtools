# LearnX custom pages - exact match locations (highest priority in nginx)
# These override the catch-all regex that would otherwise serve index.html

location = /login.html {
    alias /usr/share/jitsi-meet/login.html;
}

location = /error.html {
    alias /usr/share/jitsi-meet/error.html;
}

location = /welcome.html {
    alias /usr/share/jitsi-meet/welcome.html;
}

location = /schedule.html {
    alias /usr/share/jitsi-meet/schedule.html;
}

# Excalidraw whiteboard WebSocket proxy
location /whiteboard/ {
    proxy_pass http://jitsi-whiteboard:80/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
}
