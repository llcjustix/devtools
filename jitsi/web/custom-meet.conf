# LearnX custom pages - exact match locations (highest priority in nginx)
# These override the catch-all regex that would otherwise serve index.html

location = /login.html {
    alias /usr/share/jitsi-meet/login.html;
}

location = /error.html {
    alias /usr/share/jitsi-meet/error.html;
}

location = /welcome.html {
    alias /usr/share/jitsi-meet/welcome.html;
}
