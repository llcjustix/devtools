<svg width="200" height="48" viewBox="0 0 200 48" xmlns="http://www.w3.org/2000/svg">
  <!-- LearnX Meets icon - video camera with shield -->
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9b6dff"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- Camera body -->
  <rect x="4" y="12" width="26" height="22" rx="5" fill="url(#logoGrad)"/>
  <!-- Camera lens triangle -->
  <polygon points="32,18 40,13 40,35 32,30" fill="url(#logoGrad)"/>
  <!-- Text -->
  <text x="48" y="32" font-family="'Google Sans', 'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="600" fill="#1f1f1f">LearnX</text>
  <text x="130" y="32" font-family="'Google Sans', 'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="300" fill="#7c3aed">Meets</text>
</svg>
